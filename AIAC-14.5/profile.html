<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Profile Cards</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: linear-gradient(135deg, #667eea, #764ba2);
    --card-bg: rgba(255,255,255,0.1);
    --text: white;
}

body.dark {
    --bg: #111;
    --card-bg: #1e1e1e;
    --text: #f1f1f1;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: 0.4s;
}

/* TOGGLE BUTTON */
.toggle-btn {
    margin-bottom: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: #fff;
    font-weight: 500;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    width: 100%;
}

/* CARD */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    color: var(--text);

    display: flex;
    flex-direction: column;
    align-items: center;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* IMAGE */
.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    margin-bottom: 10px;
}

/* UPLOAD */
.upload {
    margin: 10px 0;
}

/* TEXT */
.card h2 {
    font-size: 18px;
}

.card p {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 10px;
}

/* SOCIALS */
.socials {
    display: flex;
    gap: 15px;
}

.socials a {
    color: var(--text);
    font-size: 18px;
    transition: 0.3s;
}

.socials a:hover {
    transform: scale(1.3);
    color: #ffd369;
}

/* RESPONSIVE */
@media(max-width:500px) {
    .container {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMode()">Toggle Dark/Light</button>

<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <img id="img1" src="https://i.pravatar.cc/150?img=5">
        <input type="file" class="upload" onchange="loadImage(event, 'img1')">

        <h2>Ganesh Rajulapati</h2>
        <p>Data Science Student</p>

        <div class="socials">
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <img id="img2" src="https://i.pravatar.cc/150?img=8">
        <input type="file" class="upload" onchange="loadImage(event, 'img2')">

        <h2>John Doe</h2>
        <p>Web Developer</p>

        <div class="socials">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
    </div>

</div>

<script>
/* DARK MODE */
function toggleMode() {
    document.body.classList.toggle("dark");
}

/* IMAGE UPLOAD */
function loadImage(event, id) {
    const image = document.getElementById(id);
    image.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
