<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* GRID LAYOUT */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        /* HOVER ZOOM EFFECT */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* OVERLAY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            font-size: 18px;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <h1>My Image Gallery</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=1">
            <div class="overlay">Beautiful View</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=2">
            <div class="overlay">Nature</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=3">
            <div class="overlay">Mountains</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=4">
            <div class="overlay">Ocean</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=5">
            <div class="overlay">City Life</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400?random=6">
            <div class="overlay">Sunset</div>
        </div>
    </div>

</body>
</html>
